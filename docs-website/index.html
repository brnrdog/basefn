<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>
    // Apply theme immediately to prevent FOUC (Flash of Unstyled Content)
    (function() {
      const theme = localStorage.getItem('basefn-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="basefn - A modern UI component library for ReScript and Xote with 35+ components, fine-grained reactivity, and type safety.">
  <title>basefn - UI Components for ReScript & Xote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Light theme syntax highlighting */
    [data-theme="light"] .hljs {
      background: #f6f8fa;
      color: #24292f;
    }
    [data-theme="light"] .hljs-comment { color: #6a737d; }
    [data-theme="light"] .hljs-keyword { color: #d73a49; }
    [data-theme="light"] .hljs-string { color: #032f62; }
    [data-theme="light"] .hljs-number { color: #005cc5; }
    [data-theme="light"] .hljs-function { color: #6f42c1; }
    [data-theme="light"] .hljs-variable { color: #e36209; }
    [data-theme="light"] .hljs-title { color: #6f42c1; font-weight: 600; }
    [data-theme="light"] .hljs-params { color: #24292f; }
    [data-theme="light"] .hljs-built_in { color: #005cc5; }
    [data-theme="light"] .hljs-tag { color: #22863a; }
    [data-theme="light"] .hljs-name { color: #22863a; }
    [data-theme="light"] .hljs-attr { color: #6f42c1; }
    [data-theme="light"] .hljs-symbol { color: #005cc5; }
    [data-theme="light"] .hljs-operator { color: #d73a49; }
    [data-theme="light"] .hljs-punctuation { color: #24292f; }
    [data-theme="light"] .hljs-property { color: #005cc5; }
    [data-theme="light"] .hljs-literal { color: #005cc5; }

    /* Dark theme syntax highlighting */
    [data-theme="dark"] .hljs {
      background: #1e293b;
      color: #e2e8f0;
    }
    [data-theme="dark"] .hljs-comment { color: #64748b; }
    [data-theme="dark"] .hljs-keyword { color: #f472b6; }
    [data-theme="dark"] .hljs-string { color: #7dd3fc; }
    [data-theme="dark"] .hljs-number { color: #38bdf8; }
    [data-theme="dark"] .hljs-function { color: #c4b5fd; }
    [data-theme="dark"] .hljs-variable { color: #fdba74; }
    [data-theme="dark"] .hljs-title { color: #c4b5fd; font-weight: 600; }
    [data-theme="dark"] .hljs-params { color: #e2e8f0; }
    [data-theme="dark"] .hljs-built_in { color: #38bdf8; }
    [data-theme="dark"] .hljs-tag { color: #86efac; }
    [data-theme="dark"] .hljs-name { color: #86efac; }
    [data-theme="dark"] .hljs-attr { color: #c4b5fd; }
    [data-theme="dark"] .hljs-symbol { color: #38bdf8; }
    [data-theme="dark"] .hljs-operator { color: #f472b6; }
    [data-theme="dark"] .hljs-punctuation { color: #e2e8f0; }
    [data-theme="dark"] .hljs-property { color: #38bdf8; }
    [data-theme="dark"] .hljs-literal { color: #38bdf8; }
  </style>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--docs-bg-base);
      color: var(--docs-text-primary);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    #root {
      min-height: 100vh;
    }

    code, pre, .hljs {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace;
    }

    pre {
      margin: 0;
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
    }

    pre code {
      padding: 0;
      background: transparent !important;
    }

    a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/DocsApp.res.mjs"></script>
</body>
</html>
